<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lotus Magic 🪷</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: radial-gradient(circle at center, #021a15 0%, #000a06 60%, #000101 100%);
    font-family: 'Georgia', 'Times New Roman', serif;
  }
  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H, CX, BASE;

function resize() {
  W    = canvas.width  = window.innerWidth;
  H    = canvas.height = window.innerHeight;
  CX   = W / 2;
  BASE = H * 0.87;
}
resize();
window.addEventListener('resize', resize);

/* ── helpers ─────────────────────────────── */
const clamp   = (v,a,b) => Math.max(a, Math.min(b, v));
const easeOut = x => 1 - Math.pow(1 - x, 3);
const seg     = (p,s,e) => easeOut(clamp((p-s)/(e-s), 0, 1));

/* ── stars ───────────────────────────────── */
const STARS = Array.from({length: 220}, () => ({
  x:     Math.random(),
  y:     Math.random() * 0.80,
  r:     Math.random() * 1.1 + 0.15,
  phase: Math.random() * Math.PI * 2,
  speed: 0.022 + Math.random() * 0.038,
  gold:  Math.random() < 0.2
}));

function drawBg() {
  const bg = ctx.createRadialGradient(CX, H*0.5, 10, CX, H*0.35, H*0.75);
  bg.addColorStop(0,    '#0b2923'); 
  bg.addColorStop(0.38, '#04120f');
  bg.addColorStop(0.72, '#010806');
  bg.addColorStop(1,    '#000302');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);
  
  const pool = ctx.createRadialGradient(CX, BASE+20, 5, CX, BASE-40, 260);
  pool.addColorStop(0, 'rgba(10, 80, 60, 0.25)');
  pool.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = pool;
  ctx.fillRect(0, 0, W, H);
}

function drawStars() {
  for (const s of STARS) {
    s.phase += s.speed;
    const a = 0.15 + 0.48 * Math.abs(Math.sin(s.phase));
    ctx.beginPath();
    ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2);
    ctx.fillStyle = s.gold ? `rgba(255,180,220,${a})` : `rgba(200,255,230,${a})`;
    ctx.fill();
  }
}

/* ── sparkles ────────────────────────────── */
const SPARKS = Array.from({length: 40}, () => { const s={}; resetSp(s); s.life=Math.random()*s.max; return s; });
function resetSp(s) {
  s.x    = CX + (Math.random()-0.5)*280;
  s.y    = BASE - 60 - Math.random()*350;
  s.vy   = -0.2 - Math.random()*0.5;
  s.life = 0;
  s.max  = 0.6 + Math.random()*0.6;
  s.sz   = 1.5 + Math.random()*2.5;
  s.hue  = Math.random()<0.5 ? 330+Math.random()*20 : 160+Math.random()*30; 
}
function drawSparkles(show) {
  if (!show) return;
  for (const s of SPARKS) {
    s.life += 0.009;
    if (s.life > s.max) resetSp(s);
    const a = Math.sin((s.life/s.max)*Math.PI) * show;
    ctx.beginPath();
    ctx.arc(s.x + Math.sin(s.life*4)*5, s.y + s.vy*s.life*55, s.sz, 0, Math.PI*2);
    ctx.fillStyle   = `hsla(${s.hue},100%,85%,${a})`;
    ctx.shadowColor = `hsla(${s.hue},100%,95%,${a})`;
    ctx.shadowBlur  = 15;
    ctx.fill();
    ctx.shadowBlur  = 0;
  }
}

/* ── bezier helpers ──────────────────────── */
function bezPt(x0,y0, cx1,cy1, cx2,cy2, x1,y1, t) {
  const m = 1-t;
  return [
    m*m*m*x0 + 3*m*m*t*cx1 + 3*m*t*t*cx2 + t*t*t*x1,
    m*m*m*y0 + 3*m*m*t*cy1 + 3*m*t*t*cy2 + t*t*t*y1
  ];
}

function bezAngle(x0,y0, cx1,cy1, cx2,cy2, x1,y1, t) {
  const m = 1-t;
  const dx = 3*m*m*(cx1-x0) + 6*m*t*(cx2-cx1) + 3*t*t*(x1-cx2);
  const dy = 3*m*m*(cy1-y0) + 6*m*t*(cy2-cy1) + 3*t*t*(y1-cy2);
  return Math.atan2(dy, dx);
}

function drawStem(x0,y0, cx1,cy1, cx2,cy2, x1,y1, prog, thick, col) {
  if (prog <= 0) return;
  ctx.beginPath();
  const steps = 48;
  for (let i = 0; i <= steps*prog; i++) {
    const [px,py] = bezPt(x0,y0,cx1,cy1,cx2,cy2,x1,y1, i/steps);
    i === 0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
  }
  ctx.strokeStyle = col;
  ctx.lineWidth   = thick;
  ctx.lineCap     = 'round';
  ctx.shadowColor = col;
  ctx.shadowBlur  = 4;
  ctx.stroke();
  ctx.shadowBlur  = 0;
}

/* ── LOTUS LEAF ───────────── */
function drawLeaf(x, y, rot, size, prog) {
  if (prog <= 0) return; const s = size * prog * 1.5;
  ctx.save(); ctx.translate(x, y); ctx.rotate(rot);
  
  // Pad shape
  ctx.beginPath();
  ctx.arc(0, 0, s*0.5, 0.2, Math.PI*2 - 0.2);
  ctx.lineTo(0,0);
  ctx.closePath();

  const lg = ctx.createRadialGradient(0, 0, 0, 0, 0, s*0.5);
  lg.addColorStop(0, '#0d381c'); 
  lg.addColorStop(1, '#2e7d32');
  
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 10 * prog;
  ctx.fillStyle = lg; 
  ctx.fill();
  ctx.shadowBlur = 0;
  
  // Veins
  ctx.strokeStyle = 'rgba(150, 255, 150, 0.15)';
  ctx.lineWidth = s*0.015;
  for(let i=0; i<12; i++) {
    const a = (i/12) * Math.PI*2;
    if (a < 0.2 || a > Math.PI*2 - 0.2) continue;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*s*0.45, Math.sin(a)*s*0.45); ctx.stroke();
  }
  ctx.restore();
}

/* ── LOTUS FLOWER ──────────────────── */
function drawFlower(x, y, size, prog, t, wob, stemAngle) {
  if (prog <= 0) return;
  
  const s = size * prog * 1.7;
  const rot = (stemAngle + Math.PI/2) * 0.15 + Math.sin(t*0.001 + wob) * 0.04;
  ctx.save(); ctx.translate(x, y); ctx.rotate(rot);
  
  // Glowing aura
  ctx.shadowColor = '#ff6b9e';
  ctx.shadowBlur = 25 * prog;

  const drawPetal = (length, width, color1, color2) => {
    const lg = ctx.createLinearGradient(0, 0, 0, -length);
    lg.addColorStop(0, color1);
    lg.addColorStop(1, color2);
    ctx.fillStyle = lg;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(width, -length*0.3, width*0.8, -length*0.8, 0, -length);
    ctx.bezierCurveTo(-width*0.8, -length*0.8, -width, -length*0.3, 0, 0);
    ctx.fill();
    // Inner center line
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = length * 0.01;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, -length*0.8);
    ctx.stroke();
  }

  // Back petals (larger, darker magenta)
  for (let i = 0; i < 7; i++) {
    ctx.save();
    ctx.rotate((i - 3) * 0.4);
    drawPetal(s, s * 0.45, '#880e4f', '#ff4081');
    ctx.restore();
  }

  // Middle petals (lighter pink)
  ctx.shadowBlur = 15 * prog;
  for (let i = 0; i < 5; i++) {
    ctx.save();
    ctx.rotate((i - 2) * 0.35);
    drawPetal(s * 0.85, s * 0.35, '#c2185b', '#ff80ab');
    ctx.restore();
  }

  // Front/Inner petals (almost white/very light pink)
  ctx.shadowBlur = 8 * prog;
  for (let i = 0; i < 3; i++) {
    ctx.save();
    ctx.rotate((i - 1) * 0.3);
    drawPetal(s * 0.7, s * 0.25, '#d81b60', '#ffffff');
    ctx.restore();
  }

  // Center pod (yellowish green base)
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fbc02d';
  ctx.beginPath();
  ctx.ellipse(0, -s*0.1, s*0.15, s*0.12, 0, 0, Math.PI*2);
  ctx.fill();
  
  // Stamens (golden yellow)
  ctx.strokeStyle = '#f9a825';
  ctx.lineWidth = s * 0.015;
  for(let i = 0; i < 18; i++) {
    const a = (i/18) * Math.PI + Math.PI; // top half hemisphere
    const len = s * 0.28;
    ctx.beginPath();
    ctx.moveTo(0, -s*0.1);
    ctx.lineTo(Math.cos(a)*len, -s*0.1 + Math.sin(a)*len);
    ctx.stroke();
    // anther tip
    ctx.beginPath();
    ctx.arc(Math.cos(a)*len, -s*0.1 + Math.sin(a)*len, s*0.025, 0, Math.PI*2);
    ctx.fillStyle = '#f57f17';
    ctx.fill();
  }

  ctx.restore();
}

/* ════════════════════════════════════════════
   STEMS
   ════════════════════════════════════════════ */
const START    = Date.now();
const DURATION = 5400;
let   progress = 0;

function buildStems(sc) {
  return [
    { bxo: -110*sc, byo: 0, cp1x: -120*sc, cp1y: -100*sc, cp2x: -150*sc, cp2y: -220*sc, tx: -190*sc, ty: -310*sc, fs: 34*sc, ps:[0.05, 0.46], wob: 1.3 },
    { bxo: -50*sc,  byo: 0, cp1x: -60*sc,  cp1y: -70*sc,  cp2x: -80*sc,  cp2y: -150*sc, tx: -100*sc, ty: -220*sc, fs: 28*sc, ps:[0.03, 0.41], wob: 0.5 },
    { bxo:   0,     byo: 0, cp1x:   0,     cp1y: -130*sc, cp2x:   0,     cp2y: -265*sc, tx:   0,     ty: -390*sc, fs: 46*sc, ps:[0.00, 0.37], wob: 0.0 },
    { bxo:  50*sc,  byo: 0, cp1x:  60*sc,  cp1y: -70*sc,  cp2x:  80*sc,  cp2y: -150*sc, tx:  100*sc, ty: -220*sc, fs: 28*sc, ps:[0.04, 0.42], wob: -0.5 },
    { bxo:  110*sc, byo: 0, cp1x:  120*sc, cp1y: -100*sc, cp2x:  150*sc, cp2y: -220*sc, tx:  190*sc, ty: -310*sc, fs: 34*sc, ps:[0.06, 0.47], wob: -1.4 },
  ];
}

function draw() {
  const elapsed = Date.now() - START;
  progress = Math.min(elapsed / DURATION, 1);
  const p  = progress;
  const t  = elapsed;

  ctx.clearRect(0, 0, W, H);
  drawBg();
  drawStars();

  let sc = Math.min(W,H) / 700;
  if (W < 600) sc = W / 350; 

  const bx    = CX;
  const by    = BASE;
  const SD    = '#0d381c'; // Dark lotus stem
  const SL    = '#1b5e20';   
  const stems = buildStems(sc);

  stems.forEach((st, idx) => {
    const sx0  = bx + st.bxo,  sy0  = by;
    const sx1  = bx + st.tx,   sy1  = by + st.ty;
    const cp1x = bx + st.cp1x, cp1y = by + st.cp1y;
    const cp2x = bx + st.cp2x, cp2y = by + st.cp2y;
    const sp   = seg(p, st.ps[0], st.ps[1]);

    drawStem(sx0,sy0, cp1x,cp1y, cp2x,cp2y, sx1,sy1, sp, 3.8*sc, SD);
    drawStem(sx0,sy0, cp1x,cp1y, cp2x,cp2y, sx1,sy1, sp, 1.8*sc, SL);

    /* — Lotus pads scattered — */
    const leafData = [ { t: 0.25, dir: -1 }, { t: 0.5, dir: 1 } ];

    leafData.forEach((leaf) => {
      if ((idx === 1 || idx === 3) && leaf.t > 0.4) return; 

      if (sp > leaf.t) {
        const [lx, ly] = bezPt(sx0,sy0, cp1x,cp1y, cp2x,cp2y, sx1,sy1, leaf.t);
        const lAngle   = bezAngle(sx0,sy0, cp1x,cp1y, cp2x,cp2y, sx1,sy1, leaf.t);
        // Tilt pad outwards
        const leafRot  = lAngle + (Math.PI / 3) * leaf.dir; 
        const lProg    = clamp((sp - leaf.t) * 4, 0, 1); 
        
        drawLeaf(lx, ly, leafRot, st.fs * 2.2, lProg);
      }
    });

    /* — flower — */
    const curT     = Math.min(sp, 1);
    const [fx, fy] = bezPt(sx0,sy0, cp1x,cp1y, cp2x,cp2y, sx1,sy1, curT);
    const angle    = bezAngle(sx0,sy0, cp1x,cp1y, cp2x,cp2y, sx1,sy1, curT);
    const fp       = seg(p, st.ps[1]-0.05, st.ps[1]+0.22);
    
    drawFlower(fx, fy, st.fs, fp, t, st.wob, angle);
  });

  drawSparkles(seg(p, 0.35, 0.6));

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
